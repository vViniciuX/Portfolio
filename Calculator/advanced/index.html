<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanced Calculator - ViniciuX</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="../issues/fonts/fonts.css">
</head>
<body>
  <h1 style="color: white" id="title">Advanced Calculator</h1>


  <div id="calculator">

    <div id="result">
      <p id="previousOperation"></p>
      <h1 id="currentOperation">0</h1>
    </div>

    <div id="keys">
      <div id="memory">
        <button value="MC">MC</button>
        <button value="MR">MR</button>
        <button value="M+">M+</button>
        <button value="M-">M-</button>
        <button value="MS">MS</button>
        <button value="M∨">M∨</button>
      </div>

      <div id="simbols">
        <button value="%">%</button>
        <button value="CE">CE</button>
        <button value="C">C</button>
        <button value="Backspace">⌫</button>
        <button value="⅟ₓ">⅟ₓ</button>
        <button value="²">x²</button>
        <button value="√">²√x</button>
        <button value="/">÷</button>
        <button value="7">7</button>
        <button value="8">8</button>
        <button value="9">9</button>
        <button value="*">×</button>
        <button value="4">4</button>
        <button value="5">5</button>
        <button value="6">6</button>
        <button value="-">-</button>
        <button value="1">1</button>
        <button value="2">2</button>
        <button value="3">3</button>
        <button value="+">+</button>
        <button value="±">±</button>
        <button value="0">0</button>
        <button value=",">,</button>
        <button id="result_button" value="=">=</button>
      </div>
    </div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
