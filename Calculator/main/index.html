<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator - ViniciuX</title>
  <link href="style.css" rel="stylesheet">

</head>
<body>

  <header>
    <h1 id="title">Calculator by ViniciuX</h1>
  </header>
  
  <div id="form">
    <input type="number" id="input1" placeholder="First value"><br><br>

    <select id="selector">
      <option value="+">+</option>
       <option value="-">-</option>
      <option value="*">×</option>
      <option value="/">÷</option>
    </select><br><br>

    <input type="number" id="input2" placeholder="Second value"><br><br>
    <button onclick="calculate()">Calculate</button>
  </div>

  <div>
    <h3 id="result"></h3>
  </div>

  <div>
    <a href="../advanced/index.html" id="advanced">Advanced Calculator</a>
  </div>

<script src="./script.js"></script>
</body>
</html>
